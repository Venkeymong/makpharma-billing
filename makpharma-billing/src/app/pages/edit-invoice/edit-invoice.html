<div class="edit-wrapper" *ngIf="invoice">

  <!-- ================= HEADER ================= -->
  <div class="edit-header">
    <div class="company">
      <h1>Edit Invoice</h1>
      <p>Modify invoice details</p>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ================= CUSTOMER ================= -->
  <div class="customer-box">

    <h3>Customer Details</h3>

    <div class="customer-grid">

      <div>
        <label>Name</label>
        <input [(ngModel)]="invoice.customer.name" />
      </div>

      <div>
        <label>Phone</label>
        <input [(ngModel)]="invoice.customer.phone" />
      </div>

      <div>
        <label>Payment</label>
        <select [(ngModel)]="invoice.payment">
          <option>Cash</option>
          <option>UPI</option>
          <option>Card</option>
        </select>
      </div>

    </div>

  </div>

  <div class="divider"></div>

  <!-- ================= ITEMS ================= -->
  <h3>Items</h3>

  <div class="table-wrapper">

    <table class="invoice-table">

      <thead>
        <tr>
          <th>#</th>
          <th>Medicine</th>
          <th>Qty</th>
          <th>Price</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let item of invoice.items; let i = index">

          <td>{{ i + 1 }}</td>

          <td>
            <input [(ngModel)]="item.name" />
          </td>

          <td>
            <input type="number" [(ngModel)]="item.qty" />
          </td>

          <td>
            <input type="number" [(ngModel)]="item.price" />
          </td>

        </tr>

      </tbody>

    </table>

  </div>

  <!-- ================= ACTIONS ================= -->
  <div class="edit-actions">

    <button class="btn back" routerLink="/invoices">
      Back
    </button>

    <button (click)="saveInvoice()" class="btn save">
      Save Changes
    </button>

  </div>

</div>

<!-- LOADING -->
<div *ngIf="!invoice" class="loading">
  Loading invoice...
</div>
