<div class="login-page">

  <div class="login-container">

    <div class="login-card">

      <!-- ================= HEADER ================= -->
      <div class="login-header">
        <h2 class="page-title">MAK Pharma</h2>
        <p class="subtitle">Billing Management System</p>
      </div>

      <!-- ================= FORM ================= -->
      <form (ngSubmit)="login()" #loginForm="ngForm" novalidate>

        <!-- ================= USERNAME ================= -->
        <div class="form-group">
          <label for="username">Username</label>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            required
            autocomplete="username"
            placeholder="Enter username"
            [ngModelOptions]="{ updateOn: 'blur' }"
          />
        </div>

        <!-- ================= PASSWORD ================= -->
        <div class="form-group">
          <label for="password">Password</label>

          <div class="password-box">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              required
              autocomplete="current-password"
              placeholder="Enter password"
              [ngModelOptions]="{ updateOn: 'blur' }"
            />

            <button
              type="button"
              class="eye-btn"
              (click)="showPassword = !showPassword"
              aria-label="Toggle password visibility"
            >
              {{ showPassword ? '🙈' : '👁' }}
            </button>
          </div>
        </div>

        <!-- ================= ERROR ================= -->
        <div class="error" *ngIf="loginError">
          {{ loginError }}
        </div>

        <!-- ================= FOOTER ================= -->
        <div class="form-footer">
          <span
            class="forgot"
            (click)="openForgot(); $event.preventDefault()"
          >
            Forgot Password?
          </span>
        </div>

        <!-- ================= SUBMIT ================= -->
        <button
          type="submit"
          class="btn-login"
          [disabled]="loading || !username || !password"
        >
          <span *ngIf="!loading">Login</span>
          <span *ngIf="loading" class="loader"></span>
        </button>

      </form>

    </div>

  </div>

</div>

<!-- =========================================
   🔐 FORGOT PASSWORD MODAL
========================================= -->

<div class="forgot-overlay" *ngIf="showForgot">

  <div class="forgot-card">

    <!-- ================= HEADER ================= -->
    <div class="modal-header">
      <h3>Reset Password</h3>
      <button type="button" class="close-btn" (click)="closeForgot()">✖</button>
    </div>

    <!-- ================= STEP 1: EMAIL ================= -->
    <div *ngIf="step === 1" class="modal-step">

      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Enter your email"
      />

      <div class="error" *ngIf="otpError">
        {{ otpError }}
      </div>

      <button
        type="button"
        class="btn-primary"
        (click)="sendOtp()"
        [disabled]="otpLoading"
      >
        {{ otpLoading ? 'Sending...' : 'Send OTP' }}
      </button>

    </div>

    <!-- ================= STEP 2: OTP ================= -->
    <div *ngIf="step === 2" class="modal-step">

      <input
        type="text"
        maxlength="6"
        [(ngModel)]="otp"
        name="otp"
        placeholder="Enter 6-digit OTP"
      />

      <div class="error" *ngIf="verifyError">
        {{ verifyError }}
      </div>

      <button
        type="button"
        class="btn-primary"
        (click)="verifyOtp()"
        [disabled]="verifyLoading"
      >
        {{ verifyLoading ? 'Verifying...' : 'Verify OTP' }}
      </button>

      <div class="timer">
        <span *ngIf="!canResend">
          Resend in {{ timer }}s
        </span>

        <button
          *ngIf="canResend"
          type="button"
          class="resend-btn"
          (click)="resendOtp()"
        >
          Resend OTP
        </button>
      </div>

    </div>

    <!-- ================= STEP 3: RESET ================= -->
    <div *ngIf="step === 3" class="modal-step">

      <input
        type="password"
        [(ngModel)]="newPassword"
        name="newPassword"
        placeholder="New Password"
      />

      <input
        type="password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        placeholder="Confirm Password"
      />

      <div class="error" *ngIf="resetError">
        {{ resetError }}
      </div>

      <button
        type="button"
        class="btn-success"
        (click)="resetPassword()"
        [disabled]="resetLoading"
      >
        {{ resetLoading ? 'Updating...' : 'Reset Password' }}
      </button>

    </div>

  </div>

</div>
