<div class="customer-page">

  <!-- ================= HEADER ================= -->
  <div class="header">
    <h2>Customers</h2>

    <div class="header-actions">
      <button class="btn btn-success" (click)="openForm()">
        Add Customer
      </button>

      <button class="btn btn-primary" (click)="downloadAllCustomers()">
        Download All
      </button>
    </div>
  </div>

  <!-- ================= SEARCH ================= -->
  <div class="search-box">
    <input
      type="text"
      name="searchText"
      placeholder="Search by name, phone or email..."
      [(ngModel)]="searchText"
    />
  </div>

  <!-- ================= FORM ================= -->
  <div *ngIf="showForm" class="customer-form">

    <h3>{{ editCustomerId ? 'Edit Customer' : 'Add Customer' }}</h3>

    <div class="form-grid">

      <!-- NAME -->
      <div class="form-group">
        <input
          type="text"
          name="customerName"
          [(ngModel)]="customer.name"
          required
          placeholder=" "
        />
        <label>Customer Name</label>
      </div>

      <!-- PHONE -->
      <div class="form-group">
        <input
          type="text"
          name="customerPhone"
          [(ngModel)]="customer.phone"
          required
          placeholder=" "
        />
        <label>Phone Number</label>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <input
          type="email"
          name="customerEmail"
          [(ngModel)]="customer.email"
          placeholder=" "
        />
        <label>Email</label>
      </div>

      <!-- ADDRESS -->
      <div class="form-group">
        <input
          type="text"
          name="customerAddress"
          [(ngModel)]="customer.address"
          placeholder=" "
        />
        <label>Address</label>
      </div>

      <!-- STATE -->
      <div class="form-group">
        <select
          name="customerState"
          [(ngModel)]="customer.state"
        >
          <option *ngFor="let state of [
            'Andhra Pradesh','Arunachal Pradesh','Assam','Bihar','Chhattisgarh','Goa',
            'Gujarat','Haryana','Himachal Pradesh','Jharkhand','Karnataka','Kerala',
            'Madhya Pradesh','Maharashtra','Manipur','Meghalaya','Mizoram','Nagaland',
            'Odisha','Punjab','Rajasthan','Sikkim','Tamil Nadu','Telangana',
            'Tripura','Uttar Pradesh','Uttarakhand','West Bengal'
          ]" [ngValue]="state">
            {{ state }}
          </option>
        </select>
        <label>State</label>
      </div>

      <!-- GST -->
      <div class="form-group">
        <input
          type="text"
          name="customerGst"
          [(ngModel)]="customer.gst"
          placeholder=" "
        />
        <label>GST Number</label>
      </div>

    </div>

    <!-- ================= ACTIONS ================= -->
    <div class="form-actions">
      <button class="btn btn-primary" (click)="saveCustomer()">
        {{ editCustomerId ? 'Update Customer' : 'Save Customer' }}
      </button>

      <button class="btn btn-danger" (click)="resetForm()">
        Cancel
      </button>
    </div>

  </div>

  <!-- ================= TABLE ================= -->
  <div class="table-container">

    <table class="customer-table">

      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Address</th>
          <th>State</th>
          <th>GST</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let c of paginatedCustomers">

          <td>{{ c.name }}</td>
          <td>{{ c.phone }}</td>
          <td>{{ c.email || '-' }}</td>
          <td>{{ c.address || '-' }}</td>
          <td>{{ c.state }}</td>
          <td>{{ c.gst || '-' }}</td>

          <td class="actions">
            <button class="btn btn-primary btn-sm" (click)="editCustomer(c)">
              Edit
            </button>

            <button class="btn btn-danger btn-sm" (click)="deleteCustomer(c)">
              Delete
            </button>

            <button class="btn btn-success btn-sm" (click)="downloadCustomer(c)">
              Download
            </button>
          </td>

        </tr>

        <!-- EMPTY STATE -->
        <tr *ngIf="paginatedCustomers.length === 0">
          <td colspan="7" class="no-data">
            No customers found
          </td>
        </tr>

      </tbody>

    </table>

  </div>

  <!-- ================= PAGINATION ================= -->
  <div class="pagination" *ngIf="totalPages > 1">

    <button
      class="btn"
      [disabled]="currentPage === 1"
      (click)="changePage(currentPage - 1)">
      Prev
    </button>

    <button
      *ngFor="let page of [].constructor(totalPages); let i = index"
      class="btn"
      [class.active]="currentPage === i + 1"
      (click)="changePage(i + 1)">
      {{ i + 1 }}
    </button>

    <button
      class="btn"
      [disabled]="currentPage === totalPages"
      (click)="changePage(currentPage + 1)">
      Next
    </button>

  </div>

</div>
